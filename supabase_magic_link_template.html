<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIS Contemporary Culture Fair - VIP Pass</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        table {
            border-spacing: 0;
            width: 100%;
        }
        td {
            padding: 0;
        }
        img {
            border: 0;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #000000;
            padding-bottom: 60px;
            padding-top: 60px;
        }
        .main-table {
            background-color: #0A0A0A;
            margin: 0 auto;
            width: 100%;
            max-width: 480px;
            border: 1px solid #141414;
            font-family: inherit;
        }
        .content-cell {
            padding: 48px 32px;
            text-align: center;
        }
        .logo-img {
            height: 28px;
            width: auto;
            margin-bottom: 40px;
        }
        .title {
            color: #DFBA87;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .divider {
            width: 32px;
            height: 1px;
            background-color: #DFBA87;
            margin: 0 auto 28px auto;
            opacity: 0.3;
        }
        .message {
            color: #CCCCCC;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.18em;
            line-height: 2.0;
            margin: 0 0 40px 0;
        }
        .button-container {
            margin-bottom: 48px;
        }
        .btn {
            background-color: #DFBA87;
            color: #000000 !important;
            display: inline-block;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.4em;
            padding: 15px 40px;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            /* Ensure Outlook and other clients respect display blocks */
            line-height: 1.0;
        }
        .footer {
            color: #555555;
            font-size: 9px;
            letter-spacing: 0.22em;
            line-height: 1.8;
            margin-top: 24px;
            border-t: 1px solid #141414;
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main-table">
            <tr>
                <td class="content-cell">
                    <!-- LOGO -->
                    <a href="https://www.visforthearts.com" target="_blank" style="text-decoration: none;">
                        <img class="logo-img" src="https://www.visforthearts.com/vis_logo.png" alt="VIS Logo" />
                    </a>
                    
                    <!-- TITLE -->
                    <h1 class="title">您的貴賓通行證已備妥</h1>
                    
                    <!-- DIVIDER -->
                    <div class="divider"></div>
                    
                    <!-- MESSAGE -->
                    <p class="message">
                        感謝您蒞臨 VIS Contemporary Culture Fair。<br/>
                        請輕觸下方按鈕即可開啟您的貴賓面板。
                    </p>
                    
                    <!-- BUTTON -->
                    <div class="button-container">
                        <a class="btn" href="{{ .ConfirmationURL }}">LOG IN</a>
                    </div>
                    
                    <!-- FOOTER -->
                    <div style="width: 100%; height: 1px; background-color: #141414; margin-bottom: 24px;"></div>
                    <p class="footer">
                        © 2026/2027 VIS Contemporary Culture Fair<br/>
                        VIS 當代文化博覽會
                    </p>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
